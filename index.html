<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A cinematic guide to Greek and Roman mythology: gods, heroes, monsters, myths, constellations, festivals, maps, family trees, and comparisons."
    />
    <title>The World of Ancient Mythology</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;700;800&family=Cormorant+Garamond:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-tradition="greek">
    <a class="skip-link" href="#main">Skip to content</a>
    <div class="ambient" aria-hidden="true">
      <span class="stars stars-a"></span>
      <span class="stars stars-b"></span>
      <span class="cloud cloud-a"></span>
      <span class="cloud cloud-b"></span>
      <span class="mountains"></span>
    </div>

    <header class="site-header">
      <a class="brand" href="#/" aria-label="Ancient Mythology home">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>
          <strong>Ancient Mythology</strong>
          <small>Greek and Roman worlds</small>
        </span>
      </a>

      <nav class="main-nav" aria-label="Primary navigation">
        <a href="#/tradition/greek/gods">Greek</a>
        <a href="#/tradition/roman/gods">Roman</a>
        <a href="#/compare">Compare</a>
        <a href="#/family-tree">Family Tree</a>
        <a href="#/map">Map</a>
        <a href="#/quiz">Quiz</a>
      </nav>

      <div class="tools">
        <label class="search-box">
          <span aria-hidden="true">⌕</span>
          <input id="searchInput" type="search" placeholder="Search gods, myths, places..." autocomplete="off" />
        </label>
        <div class="tradition-toggle" aria-label="Switch mythology tradition">
          <button class="active" id="greekToggle" type="button">Greek</button>
          <button id="romanToggle" type="button">Roman</button>
        </div>
        <button class="theme-button" id="themeButton" type="button" aria-label="Switch to marble light mode">☾</button>
      </div>
    </header>

    <div class="search-results" id="searchResults" aria-live="polite"></div>

    <main id="main" tabindex="-1"></main>

    <footer class="site-footer">
      <p>Roman gods are presented as Roman powers with distinct civic, ritual, and cultural identities, not as renamed Greek deities.</p>
      <a href="#/">Return home</a>
    </footer>

    <div class="modal" id="modal" role="dialog" aria-modal="true" aria-labelledby="modalTitle" hidden>
      <button class="modal-backdrop" type="button" data-close aria-label="Close detail view"></button>
      <article class="modal-card" tabindex="-1">
        <button class="modal-close" type="button" data-close aria-label="Close detail view">×</button>
        <div id="modalContent"></div>
      </article>
    </div>

    <script src="app.js"></script>
  </body>
</html>
